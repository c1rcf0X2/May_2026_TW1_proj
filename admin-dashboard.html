<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="p-6 bg-gray-100">

    <div class="max-w-3xl mx-auto bg-white p-6 rounded shadow">

        <h1 class="text-2xl text-blue-500 text-center mb-6 font-bold">
            Admin Dashboard
        </h1>

        <div class="flex flex-col md:flex-row gap-2 mb-4">
            <input id="name" placeholder="Item Name" class="border p-2 rounded flex-1">

            <input id="price" type="number" placeholder="Price" class="border p-2 rounded flex-1">

            <input id="img" placeholder="Image URL" class="border p-2 mt-2">

            <button onclick="addItem()" class="bg-green-600 text-white p-2 rounded hover:bg-green-700 transition">
                Add Item
            </button>
        </div>

        <div class="flex gap-2 mb-4">
            <button onclick="goHome()" class="bg-blue-600 text-white p-2 rounded hover:bg-blue-700 transition">
                Back to Home
            </button>

            <button onclick="logout()" class="bg-red-600 text-white p-2 rounded hover:bg-red-700 transition">
                Logout
            </button>
        </div>

        <h2 class="text-xl font-bold mb-3">Menu Items</h2>

        <div id="list"></div>

    </div>

    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>

</body>

</html>
